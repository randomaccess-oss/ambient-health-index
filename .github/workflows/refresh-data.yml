name: Refresh Market Data

on:
  schedule:
    # Runs on the 1st of every month at 9:00 AM UTC
    - cron: '0 9 1 * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: scripts

      - name: Generate updated market data
        run: node generate-markets.js
        working-directory: scripts
        env:
          WALK_SCORE_API_KEY: ${{ secrets.WALK_SCORE_API_KEY }}

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet markets.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add markets.json
          git commit -m "chore: refresh market data ($(date +%Y-%m-%d))"
          git push
